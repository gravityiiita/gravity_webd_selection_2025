<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Fetcher 🚀</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <h1>🔍 GitHub Profile Finder</h1>
    <p class="subtitle">Enter a GitHub username to fetch details</p>

    <div class="search-box">
      <input type="text" id="username" placeholder="e.g. torvalds" />
      <button onclick="fetchProfile()">Fetch</button>
    </div>

    <div id="loader" class="loader hidden"></div>

    <div id="profile-card" class="profile-card hidden">
      <!-- Profile data dynamically inserted -->
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
